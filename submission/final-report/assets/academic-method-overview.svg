<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="660" viewBox="0 0 1400 660">
  <defs>
    <style>
      .title{font:700 32px Arial,sans-serif;fill:#111827}
      .sub{font:400 17px Arial,sans-serif;fill:#475569}
      .th{font:700 16px Arial,sans-serif;fill:#fff}
      .td{font:400 15px Arial,sans-serif;fill:#334155}
      .module{font:700 15px Arial,sans-serif;fill:#111827}
      .grid{fill:#fff;stroke:#CBD5E1;stroke-width:1.5}
      .head{fill:#111827}
      .alt{fill:#F8FAFC}
    </style>
  </defs>
  <rect width="1400" height="660" fill="#fff"/>
  <text x="48" y="56" class="title">Module-Level Data Science Methods</text>
  <text x="48" y="86" class="sub">The five modules map directly to data sources, preprocessing, model design, and result outputs.</text>
  <rect x="48" y="130" width="1304" height="58" class="head"/>
  <text x="76" y="165" class="th">Module</text>
  <text x="300" y="165" class="th">Data Sources</text>
  <text x="575" y="165" class="th">Pre-processing</text>
  <text x="850" y="165" class="th">Methods</text>
  <text x="1135" y="165" class="th">Outputs</text>
  <rect x="48" y="188" width="1304" height="78" class="grid"/>
  <text x="76" y="232" class="module">Frontend</text>
  <text x="300" y="222" class="td">user query, profile, context</text>
  <text x="575" y="222" class="td">request validation, language display</text>
  <text x="850" y="222" class="td">thin API workflow and source cards</text>
  <text x="1135" y="222" class="td">answer UI</text>
  <rect x="48" y="266" width="1304" height="78" class="alt"/>
  <rect x="48" y="266" width="1304" height="78" class="grid"/>
  <text x="76" y="310" class="module">NLU &amp; Retrieval</text>
  <text x="300" y="300" class="td">query text, aliases, documents</text>
  <text x="575" y="300" class="td">normalization, entity linking, dedup</text>
  <text x="850" y="300" class="td">rules, TF-IDF, CRF, ranker</text>
  <text x="1135" y="300" class="td">nlu_result, retrieval_result</text>
  <rect x="48" y="344" width="1304" height="78" class="grid"/>
  <text x="76" y="388" class="module">Numerical Analysis</text>
  <text x="300" y="378" class="td">market, fundamental, macro rows</text>
  <text x="575" y="378" class="td">symbol, date, missing-value checks</text>
  <text x="850" y="378" class="td">returns, MA, RSI, MACD, volatility</text>
  <text x="1135" y="378" class="td">analysis_summary</text>
  <rect x="48" y="422" width="1304" height="78" class="alt"/>
  <rect x="48" y="422" width="1304" height="78" class="grid"/>
  <text x="76" y="466" class="module">Text Analysis</text>
  <text x="300" y="456" class="td">retrieved news and announcements</text>
  <text x="575" y="456" class="td">language, sentence, entity filters</text>
  <text x="850" y="456" class="td">FinBERT sentence sentiment</text>
  <text x="1135" y="456" class="td">SentimentItem records</text>
  <rect x="48" y="500" width="1304" height="78" class="grid"/>
  <text x="76" y="544" class="module">LLM Summary</text>
  <text x="300" y="534" class="td">compact evidence JSON</text>
  <text x="575" y="534" class="td">debug/raw-noise removal</text>
  <text x="850" y="534" class="td">strict JSON prompting and repair</text>
  <text x="1135" y="534" class="td">answer and follow-ups</text>
</svg>
