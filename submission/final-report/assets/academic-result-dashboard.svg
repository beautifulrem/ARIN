<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 14px Arial, sans-serif; fill: #4b5563; }
      .label { font: 700 16px Arial, sans-serif; fill: #172033; }
      .small { font: 400 13px Arial, sans-serif; fill: #4b5563; }
      .metric { font: 700 34px Arial, sans-serif; fill: #8b0000; }
      .axis { font: 400 12px Arial, sans-serif; fill: #4b5563; }
      .box { fill: #ffffff; stroke: #d7dee9; stroke-width: 1.4; rx: 8; }
      .muted { fill: #f7f7f7; stroke: #d7dee9; stroke-width: 1.2; rx: 8; }
      .barbg { fill: #eef2f7; rx: 5; }
      .bar { fill: #285aa6; rx: 5; }
      .bar2 { fill: #0f766e; rx: 5; }
      .line { stroke: #d7dee9; stroke-width: 1.3; }
    </style>
  </defs>

